# /etc/disjorn-broker/broker.toml — disjorn-broker daemon configuration.
# TEMPLATE — copied into place by harness/keyboard/04-broker.sh (never
# overwriting an existing file). Owned root:plink 0640; edit with sudoedit.
#
# This file lives OUTSIDE both resident containers on purpose: nothing in it
# is reachable — for reading or writing — from inside a resident's world.
# (HARNESS-PLAN WP-H4 "protected by placement".)

[broker]
# Where the unix socket lives. The systemd unit sets RuntimeDirectory=
# disjorn-broker, which creates /run/disjorn-broker owned by plink — that is
# why the socket sits in a subdirectory rather than directly in /run (a
# non-root daemon cannot create files in /run itself).
# This path gets bind-mounted into each resident container (WP-H1).
socket_path = "/run/disjorn-broker/broker.sock"

# Append-only JSON-lines audit trail: one line per call, allowed or denied.
# /var/log/disjorn-broker is created by the unit's LogsDirectory=.
audit_log = "/var/log/disjorn-broker/audit.jsonl"

# BL-D2: where a detached build's stdout/stderr are spooled (0600 temp files,
# deleted when the build reaches a terminal state; only a 64 KiB tail is ever
# read back into the broker, so a flooding build can no longer balloon the
# broker's RSS). Default when unset: <dir of audit_log>/build-logs, i.e.
# /var/log/disjorn-broker/build-logs — plink-owned, resident-unreachable, and
# on DISK. Do not point this at /tmp on this host: /tmp is tmpfs, so the flood
# would simply move back into RAM.
#
# WP-L4 open fork, two more things live here:
#   * <slug>.build.json — one 0600 sidecar per in-flight build (unit, branch,
#     both spool paths, the ORIGINAL deadline). A build now runs in a transient
#     unit outside this daemon's cgroup, so a broker restart no longer kills it;
#     the sidecar is how the NEXT broker process finds it, re-claims its slug and
#     still posts its done/failed line. Removed on every terminal path, and
#     swept at startup along with any spool file whose build died with its broker.
#   * disk bounding: the build's stdout is a regular file (a spool here), so the
#     unit carries LimitFSIZE (RLIMIT_FSIZE) — a flooding build dies loudly on
#     SIGXFSZ instead of filling /. The ceiling is a constant in the launch
#     helper, deliberately not a config value a caller could widen.
# build_log_dir = "/var/lib/disjorn-broker/build-logs"

[uids]
# Kernel uid -> resident identity. THE authentication table: the broker trusts
# SO_PEERCRED, maps the uid here, and denies anything unlisted.
# Fill in the real uids after harness/keyboard/01-users.sh has run
# (`id -u res-claudette`). Keys must be quoted (TOML).
# "998" = "res-claudette"
# "997" = "res-gable"

[residents.res-claudette]
# The ONLY file read-own-log will serve to res-claudette. No other path is
# ever accepted, whatever the caller sends.
log_path = "/home/res-claudette/logs/disjorn_bot.log"
# OPTIONAL (BL-D1): host directories this resident can WRITE that the broker
# cannot infer from the /home/<resident> convention — e.g. a shared rw volume
# mounted into the container from elsewhere. The start-build guard treats these
# as resident volumes and refuses to start if start_build.specs_dir lands in
# one. Declare any such mount here; the guard's permission walk is a backstop,
# not a substitute (a bind mount can be rw inside the container while the host
# path looks read-only to the res-* uid).
# writable_roots = ["/srv/shared-scratch"]

[residents.res-claudette.path_map]
# classify-diff path translation AND allowlist: residents pass their
# in-container paths; the broker (host-side) maps prefixes, longest wins;
# anything outside every mapped root is bad-args. This deployment: the
# read-only repo mirror and her home volume.
"/opt/disjorn" = "/srv/disjorn-ro"
"/home/resident" = "/home/res-claudette/resident-home"
# WP-H12 metrics producer inputs (all read-only; optional — omit to skip that
# section for this resident). house_memory retrieval log, WP-H5 ~/.action-log
# (all tool calls in the container), WP-H5 budget.json (for cap legibility),
# and the markdown spine dir. These live in the resident's home volume, which
# the host can read; the metrics producer runs host-side, never in a container.
retrieval_log = "/home/res-claudette/memory/memory_retrieval.jsonl"
action_log = "/home/res-claudette/.action-log"
budget_json = "/home/plink/resident-config/claudette/budget.json"
# spine_dir = "/home/res-claudette/claudette/spine"

[residents.res-gable]
log_path = "/home/res-gable/logs/gable.log"
retrieval_log = "/home/res-gable/memory/memory_retrieval.jsonl"
action_log = "/home/res-gable/.action-log"
budget_json = "/home/plink/resident-config/gable/budget.json"
# spine_dir = "/home/res-gable/gable/spine"

[residents.res-gable.path_map]
# REQUIRED for classify-diff — this is the allowlist, not just translation.
# WP-H13 F2: when a resident has NO path_map, classify-diff falls open and
# accepts ANY absolute host path the broker uid can read. Every resident with
# classify-diff must have a map, even while the verb ships OFF. Gable's
# container view -> host paths, same two roots as his run-resident mounts.
"/opt/disjorn" = "/srv/disjorn-ro"
"/home/resident" = "/home/res-gable/resident-home"

[commands]
# Fixed argv lists — the broker NEVER passes a string to a shell. Validated
# scalar arguments (line counts, git ranges) are appended by the handlers as
# separate argv items; callers cannot inject flags or commands.
#
# restart-disjorn: `sudo -n` succeeds only because of the single line in
# /etc/sudoers.d/90-disjorn-broker (exactly `systemctl restart disjorn`).
restart_disjorn = ["sudo", "-n", "systemctl", "restart", "disjorn"]

# run-server-tests: the full server pytest suite, run from the server dir.
run_server_tests = ["/home/plink/Disjorn/Disjorn/server/.venv/bin/python", "-m", "pytest", "tests", "-q"]
run_server_tests_cwd = "/home/plink/Disjorn/Disjorn/server"

# read-prod-logs: handler appends ["-n", "<validated count>"].
read_prod_logs = ["journalctl", "-u", "disjorn", "--no-pager", "-o", "short-iso"]

# classify-diff: handler appends --repo/--range/--gates-json (all validated).
classify_diff = ["/home/plink/Disjorn/Disjorn/server/.venv/bin/python", "/home/plink/Disjorn/Disjorn/harness/classifier/classify_diff.py"]

# refresh-mirror: fast-forward the shared read-only mirror (/srv/disjorn-ro,
# the residents' only view of the repo) to the canonical repo's main. The verb
# takes NO caller args — all three argvs are fixed here, so residents can
# refresh the mirror but never aim git anywhere else. --ff-only fails loudly
# if the mirror ever diverges (that stays plink's to resolve).
refresh_mirror_fetch = ["git", "-C", "/srv/disjorn-ro", "fetch", "origin"]
refresh_mirror_update = ["git", "-C", "/srv/disjorn-ro", "merge", "--ff-only", "origin/main"]
refresh_mirror_head = ["git", "-C", "/srv/disjorn-ro", "rev-parse", "--short", "HEAD"]

[paths]
# read-metrics serves exactly this file. The WP-H12 producer
# (harness/metrics/metrics.py `build`) writes it; run it on a timer. Until it
# has run once, an empty {} JSON file is fine.
metrics_json = "/var/lib/disjorn-broker/metrics.json"
# classify-diff hands this to the classifier as --config. Protected by
# placement: install the repo's harness/classifier/protected-paths.toml to
# /etc/disjorn-broker/ (root:plink 0640, resident-unreachable) and point here.
protected_paths = "/etc/disjorn-broker/protected-paths.toml"

[budgets]
# WP-H12 daily per-resident action budget on broker verbs. DEFAULT OFF:
# with nothing set here the broker never denies on budget. Instrument first
# (every call is audited; read the real counts in #custodian), THEN set a cap.
# A cap change needs a broker restart (kill switches in verbs.toml stay live).
#
# default_daily_action_cap = 2000        # applies to any resident without an override
# [budgets.res-claudette]
# daily_action_cap = 2000
# [budgets.res-gable]
# daily_action_cap = 2000

[start_build]
# WP-L4 start-build: launch a DETACHED build of a CONFIRMED spec to a
# `loop/<slug>` branch. Like the WP-H9 summon launcher, argv is ENTIRELY
# config-derived — [*command, resident, slug, *session_argv, "--model", model]
# — and the spec (the chat-derived design) is fed on STDIN, never spliced into
# argv. The verb ships OFF in verbs.toml; this section is inert until flipped.
#
# HOW THE BUILD IS LAUNCHED (WP-L4 open fork, KEYBOARD-NEXT 6b).
#
# NOT run-build.sh directly. The broker runs as plink, so a build launched
# straight from it ran podman as PLINK: `--userns keep-id` mapped the container
# to uid 1000 (so a callback to this socket presented plink in SO_PEERCRED),
# `$HOME/resident-home` resolved to /home/plink/resident-home, a
# resident-authored spec drove a session with plink's filesystem access, and the
# session sat in the broker's cgroup so any broker restart killed it.
#
# Instead the launch goes through ONE validating root helper
# (harness/broker/disjorn-build-launch), which execs:
#     systemd-run --unit=disjorn-build-<slug> --uid=res-<resident> --pipe
#                 --collect <fixed limits> -- <run-build.sh> <resident> <slug> …
# so the build is a TRANSIENT SYSTEM SERVICE under the resident's own uid:
# correct identity by construction, outside this daemon's cgroup (survives a
# broker restart — see the sidecar/re-adoption note under build_log_dir), and
# with kernel-enforced memory/disk/wall-clock ceilings.
#
# `sudo -n` succeeds only because of /etc/sudoers.d/91-disjorn-build, which
# names that ONE helper in exactly two shapes (run/stop) with regex-constrained
# arguments — never systemd-run, which cannot be granted safely (any wildcard in
# a sudoers rule for it is equivalent to a grant of full root; the file explains
# why at length). Install the helper root:root 0755 FIRST or every launch fails
# closed. The trailing "run" is the helper's subcommand; the broker appends
# <resident> <slug> <session_argv…> after it, exactly as run-build.sh expects.
command = ["sudo", "-n", "/usr/local/lib/disjorn/disjorn-build-launch", "run"]
# How the reaper KILLS a build at the cap. The unit lives outside the broker's
# cgroup, so killing the local sudo/systemd-run process no longer kills the
# build: the cap only bites because of this. Same helper, second fixed shape;
# the broker appends <resident> <slug>.
stop_command = ["sudo", "-n", "/usr/local/lib/disjorn/disjorn-build-launch", "stop"]
# How a build's unit is POLLED (unprivileged — no sudo, read-only). Used when
# re-adopting a build that outlived a broker restart; the broker appends the
# unit name. A unit systemd has forgotten answers "inactive", which is terminal.
unit_state_command = ["systemctl", "show", "--property=ActiveState", "--value"]
# WHICH resident the build runs AS — this is now a kernel identity (res-<name>),
# not a label. It must have a line in /etc/sudoers.d/91-disjorn-build; adding a
# build resident is a keyboard act with a visible diff, on purpose.
resident = "gable"
# The command run INSIDE the container: a headless Claude Code build session.
# The trailing "$@" + the "build-session" argv0 are load-bearing (WP-L5): the
# broker appends `--model <id>` after this list, and `bash -lc "<script>"
# build-session --model <id>` makes those the script's positional args, which
# "$@" forwards to claude. Drop either and the pin stops reaching claude.
session_argv = ["bash", "-lc", "exec claude -p --output-format json \"$@\"", "build-session"]
# WP-L5 MODEL PIN — no fallback. A blank/absent pin is config drift and the
# verb refuses (never rides the account default). ONE-PIN UPGRADE PATH: flip
# this one value when Fable API access returns on plink's credits.
model = "claude-opus-4-8"
# The authoritative committed specs the confirm gate reads: the read-only repo
# mirror's SPECS/ (refreshed by refresh-mirror). A spec must resolve DIRECTLY
# inside this dir — no `..`, no symlink escape — and be status `confirmed` with
# a filled confirm record, or the build is refused.
#
# BL-D1 — THIS LINE IS THE AUTHORIZATION, NOT A PATH PREFERENCE. The confirm
# record is a presence check on text; it only means anything because residents
# cannot write this directory. Point it at anything a resident can write (a
# resident home, a shared rw volume, a world-writable dir) and any resident can
# forge "Confirmed by: plink" and self-authorize builds. The broker therefore
# VERIFIES this at startup — resident volumes by path, plus a stat() of the
# directory and every parent up to / — and REFUSES TO START if it cannot prove
# the directory is resident-unwritable. There is no override flag. Keep it on
# the RO mirror; if you must move it, move it somewhere plink owns and
# residents never mount.
specs_dir = "/srv/disjorn-ro/SPECS"
# Wall-clock cap for the detached build (seconds). Longer than the 300s summon
# — a build is a whole feature, not a chat turn. The reaper kills at the cap
# and narrates a loud failure.
timeout_sec = 3600
# Per-day build budget (BUILD-LOOP.md ratified default: 2). CAPPED by default,
# unlike the action budget above. Race-safe (count-with-reservation, H13-D4).
daily_build_cap = 2
# Optional per-resident override:
# [start_build.per_resident.res-gable]
# daily_build_cap = 2

[disjorn]
# file-proposal posts to #custodian AS THE BROKER'S OWN bot identity — the
# proposal text is data; the authority to post is the broker's. Create a
# dedicated bot (e.g. "broker") via server/cli.py and put its API key in
# api_key_path (root:plink 0640).
url = "http://127.0.0.1:8399"
api_key_path = "/etc/disjorn-broker/broker-api-key"
# Channel id of #custodian (look it up in the server DB / channel list).
custodian_channel_id = 4
